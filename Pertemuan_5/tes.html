<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Manajemen Menu Warung Makan</title>
    <!-- Koneksi ke style.css (CSS) -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Login -->
        <div class="login">
            <form action="">
                <h1>Login</h1>
                <hr>
                <p>Manajemen Menu Warung Makan</p>
                <label for="">ID</label>
                <input type="text" placeholder="Contoh: 007">
                <label for="">Password</label>
                <input type="password">
                <button>Login</button>
                <p>Silakan hubungi admin bila Anda belum memiliki akun atau lupa ID/Password</p>
            </form>
        </div>
        <!-- Sisi Kanan -->
        <div class="kanan">
            <img src="warung_makan_animasi.jpg" alt="">
        </div>

    </div>
</body>
</html>
