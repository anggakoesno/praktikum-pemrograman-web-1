<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation & Transition - Komponen Interaktif</title>
    <style>
        :root {
            --primary-bg: #f4f4f9;
            --nav-bg: #7318eb;
            --btn-green: #4ccb54;
            --btn-orange: #ff6d3c;
            --btn-pink: #f84ef8;
            --white: #ffffff;
            --transition-normal: 0.3s ease;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: var(--primary-bg);
            /* Agar bisa scroll untuk lihat efek sticky */
            height: 1200px; 
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-content {
            animation: fadeInPage 1s ease-out forwards;
        }

        .navbar {
            display: flex;
            position: sticky;
            top: 0;
            justify-content: center;
            align-items: center;
            height: 60px;
            background: var(--nav-bg);
            color: var(--white);
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .button-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        button {
            padding: 12px 24px;
            color: var(--white);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition-normal);
        }

        .btn-warna { 
            background-color: var(--btn-green); 
        }
        .btn-warna:hover { 
            background-color: #05a30a; 
        }

        .btn-scale { 
            background-color: var(--btn-orange); 
        }
        .btn-scale:hover { 
            transform: scale(1.1); 
        }

        .btn-angkat { 
            background-color: var(--btn-pink); 
        }

        .btn-angkat:hover { 
            transform: translateY(-7px);
            box-shadow: 0 8px 15px rgba(248, 78, 248, 0.4);
        }

        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #ccc;
            border-top: 5px solid var(--nav-bg);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .card-container {
            display: flex;
            justify-content: center;
            margin-top: 80px;
            perspective: 1000px; /* Penting untuk efek 3D */
        }

        .card {
            width: 200px;
            height: 250px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card-front { 
            background-color: var(--nav-bg);
        }
        .card-back {
            background-color: var(--btn-orange);
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h3>Animasi & Transisi Interaktif</h3>
    </nav>

    <div class="main-content">
        <div class="button-section">
            <button class="btn-warna">Ganti Warna</button>
            <button class="btn-scale">Ganti Scale</button>
            <button class="btn-angkat">Ganti Shadow</button>
        </div>

        <div class="spinner-container">
            <div class="loading-spinner"></div>
            <p>Memuat Data...</p>
        </div>

        <div class="card-container">
            <div class="card">
                <div class="card-front">
                    <p>Kartu Depan</p>
                </div>
                <div class="card-back">
                    <p>Kartu Belakang</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
