<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position - Layout Kartu Profil</title>
    <style>
        body {
            font-family: Poppins, sans-serif;
            margin: 0;
            background-color: #f4f4f9;
            height: 1500px; /* Tambahan tinggi halaman supaya bisa di-scroll*/
        }

        /* Sticky Navbar */
        .navbar {
            display: flex;
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            justify-content: center;
            align-items: center;
            height: 60px;
            background: #7318eb;
            color: white;
            z-index: 100; /* agar selalu di atas konten saat scroll */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Container untuk Card(Relative) */
        .card {
            position: relative;
            width: 280px;
            height: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(66, 7, 202, 0.1);
            overflow: hidden;
            margin: 100px auto; /* Memberi jarak dari navbar */
            background-color: white;
            border: 1px solid white;
        }

        .card-header {
            height: 120px;
            background-color: #7318eb;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            text-align: center;
        }

        .card-header h2 {
            font-size: 1.2rem;
            margin: 0;
        }

        .card-header p {
            font-size: 0.8rem;
            margin: 5px 0 0;
            opacity: 0.9;
        }

        /* 2. Badge Status (Absolute) */
        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgb(3, 157, 3);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 2px 4px rgb(72, 30, 109);
        }

        .card-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin-top: -40px; /* Menarik foto ke atas agar overlap dengan header */
        }

        .card-body img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            background: #ccc;
        }

        .card-body .bio {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #555;
            line-height: 1.4;
        }

        .card-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #eee;
            font-size: 0.8rem;
            color: #777;
        }

        /* 4. Back to Top Button (Fixed) */
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #7318eb;
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 101; /* Lebih tinggi dari navbar jika diperlukan */
        }

        .back-to-top:hover {
            background-color: #410095;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h3>CSS Position - Layout Kartu Profil</h3>
    </nav>

    <div class="card">
        <div class="badge">Online</div>
        
        <div class="card-header">
            <h2>R. Angga Kusna Jati</h2>
            <p>Software Engineering Student</p>
        </div>

        <div class="card-body">
            <img src="warungmakan.jpeg" alt="Profil">
            <p class="bio">Passionate about Full-Stack Web Development and Software Engineering.</p>
        </div>

        <div class="card-footer">
            <p>rafaelanggajati@gmail.com</p>
        </div>
    </div>

    <a href="#" class="back-to-top">↑ Back to Top</a>

</body>
</html>
